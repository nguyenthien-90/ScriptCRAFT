# Workflow tự động build và deploy dự án Vite lên GitHub Pages
name: Deploy static content to Pages

on:
  # Chạy tự động mỗi khi bạn push code lên nhánh main
  push:
    branches: ['main']

  # Cho phép bạn chạy thủ công từ tab Actions nếu muốn
  workflow_dispatch:

# Cấp quyền cho GITHUB_TOKEN để có thể deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Hủy các lượt deploy cũ nếu có lượt deploy mới hơn đang chạy
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Chỉ định thư mục sản phẩm sau khi build (Vite mặc định là dist)
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
